version: '3.8'

services:
  # === 后端 API ===
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=circle
      - DB_USER=circle
      - DB_PASSWORD=circle_prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - BRAND_NAME=园圈
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - circle-net

  # === PostgreSQL ===
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: circle
      POSTGRES_USER: circle
      POSTGRES_PASSWORD: circle_prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U circle"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - circle-net

  # === Redis ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - circle-net

  # === 前端（静态文件通过 Nginx 服务） ===
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NEXT_PUBLIC_API_URL=http://server:3001
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - circle-net

  # === AI Agent: 风控 ===
  risk-agent:
    build:
      context: ./agents/risk-match
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - circle-net

volumes:
  postgres-data:

networks:
  circle-net:
    driver: bridge
